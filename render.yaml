databases:
  - name: dealbox-db
    databaseName: dealbox
    user: dealbox_user
    plan: free

services:
  - type: web
    name: dealbox
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: python -m gunicorn "app:create_app()" --bind "0.0.0.0:$PORT" --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dealbox-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
